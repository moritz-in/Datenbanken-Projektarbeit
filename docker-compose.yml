services:
  mysql:
    image: mysql:8.4
    container_name: skeleton-mysql
    env_file: ../.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-productdb}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      # Port verschoben auf 3316
      - "${SKELETON_MYSQL_HOST_PORT:-3316}:3306"
    volumes:
      - skeleton_mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
      - ./data:/csv:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
      --secure-file-priv=""
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - skeleton_net

  adminer:
    image: adminer:latest
    container_name: skeleton-adminer
    ports:
      # Port verschoben auf 8990
      - "${SKELETON_ADMINER_HOST_PORT:-8990}:8080"
    depends_on:
      - mysql
    restart: unless-stopped
    networks:
      - skeleton_net

  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: skeleton-qdrant
    ports:
      # Ports verschoben auf 6343 und 6344
      - "${SKELETON_QDRANT_HTTP_HOST_PORT:-6343}:6333"
      - "${SKELETON_QDRANT_GRPC_HOST_PORT:-6344}:6334"
    volumes:
      - skeleton_qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - skeleton_net

  neo4j:
    image: neo4j:5
    container_name: skeleton-neo4j
    ports:
      # Ports verschoben auf 7484 und 7697
      - "${SKELETON_NEO4J_HTTP_HOST_PORT:-7484}:7474"   # Web UI
      - "${SKELETON_NEO4J_BOLT_HOST_PORT:-7697}:7687"   # Bolt
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/admin123}
    volumes:
      - skeleton_neo4j_data:/data
      - skeleton_neo4j_logs:/logs
    restart: unless-stopped
    networks:
      - skeleton_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: skeleton-app
    ports:
      # HIER IST DEIN GEWÜNSCHTER PORT 8081
      - "${SKELETON_APP_HOST_PORT:-8081}:5000"
    env_file: ../.env
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-dev-secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
      # Die internen Service-Namen (mysql, qdrant, neo4j) bleiben gleich,
      # da Docker sie innerhalb des skeleton_net automatisch richtig auflöst!
      MYSQL_URL: mysql+pymysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-productdb}
      QDRANT_URL: http://qdrant:6333
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      EMBEDDING_DIM: ${EMBEDDING_DIM:-384}
      TRANSFORMERS_NO_TF: "1"
      USE_TF: "0"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-admin123}
      PDF_UPLOAD_DIR: /data/pdfs
    volumes:
      - skeleton_pdf_uploads:/data/pdfs
      - skeleton_hf_cache:/root/.cache/huggingface
      - ./logs:/app/logs
    depends_on:
      - mysql
      - qdrant
      - neo4j
    restart: unless-stopped
    networks:
      - skeleton_net

# Isolierte Festplatten für das Skeleton
volumes:
  skeleton_mysql_data:
  skeleton_qdrant_data:
  skeleton_neo4j_data:
  skeleton_neo4j_logs:
  skeleton_pdf_uploads:
  skeleton_hf_cache:

# Isoliertes Netzwerk für das Skeleton
networks:
  skeleton_net:
    driver: bridge